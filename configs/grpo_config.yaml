# AlphaAgentEvo GRPO Training Configuration
# Target: RTX 4080 16GB, single GPU  (see PLAN.md for memory budget)
# Model path can be overridden at runtime with the MODEL_PATH env variable.

model:
  name: F:\projects\models\Qwen3.5-4B 
  flash_attn: false          # Disable until flash-attn is installed for sm_120
  quantization: nf4          # "nf4" -> 4-bit QLoRA via bitsandbytes; null -> bf16 (RTX 5090)

lora:
  r: 16                       # QLoRA rank (smoke test); bump to 64 on 24GB+ GPUs
  alpha: 32                   # Keep alpha / r = 2
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  num_generations: 2            # GRPO group size (min valid is 2)
  max_new_tokens: 768           # Max tokens per completion (fits on 16GB)
  max_tool_calling_iterations: 2  # Multi-turn tool calling iterations per generation
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  gradient_checkpointing: true  # Recompute activations in backward pass
  num_train_epochs: 1
  max_steps: 150                # Total training steps
  learning_rate: 1.0e-6
  bf16: true                    # bf16 compute (LoRA weights + QLoRA compute dtype)
  logging_steps: 1
  save_steps: 50
  save_total_limit: 3
  report_to: tensorboard
  beta: 0.001                   # KL divergence penalty (paper uses 0.001)
  seed: 42

data:
  train_path: data/train.parquet
  val_path: data/val.parquet

backtest:
  url: http://localhost:8001
  default_period: train          # IC computed only on train period during GRPO
  periods:
    train:
      start: "2016-01-01"
      end: "2023-12-31"
    val:
      start: "2024-01-01"
      end: "2024-12-31"
    test:
      start: "2025-01-01"
      end: "2026-12-31"
